<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Link Generator PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0f14;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    max-width:480px;
    width:100%;
    background:#111827;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 30px rgba(0,255,180,.2);
}

/* 🔥 Animated Name */
.name{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#00ffb3,#00c2ff,#ff00ff,#00ffb3);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 4s linear infinite;
}
@keyframes glow{
    0%{background-position:0%}
    100%{background-position:300%}
}

h1{
    text-align:center;
    color:#00ffb3;
}
p{
    text-align:center;
    font-size:13px;
    color:#aaa;
}
label{margin-top:12px;display:block;font-size:14px;}
select,input,textarea{
    width:100%;
    margin-top:6px;
    padding:10px;
    border-radius:6px;
    border:none;
    background:#0b1220;
    color:#fff;
}
textarea{resize:none}
button{
    width:100%;
    margin-top:14px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#00ffb3,#00c2ff);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
button:disabled{
    opacity:.5;
    cursor:not-allowed;
}
.output{
    margin-top:12px;
    padding:10px;
    background:#0b1220;
    border-radius:6px;
    font-size:13px;
    word-break:break-all;
}
.qr{
    text-align:center;
    margin-top:15px;
}

/* ❌ removed channels section */

.footer{
    margin-top:12px;
    font-size:12px;
    color:#777;
    text-align:center;
}

/* 🚀 Big WhatsApp Button */
.big-btn{
    display:block;
    margin-top:12px;
    padding:12px;
    text-align:center;
    border-radius:8px;
    background:linear-gradient(135deg,#25D366,#00ffb3);
    color:#000;
    font-weight:bold;
    text-decoration:none;
    animation:pulse 1.5s infinite;
}
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.06)}
    100%{transform:scale(1)}
}

.success{
    text-align:center;
    font-size:12px;
    color:#00ffb3;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="name">HAMEED ULLAH</div>

<h1>WhatsApp Link Generator</h1>
<p>All Countries • QR Code • Copy Fixed</p>

<label>Country Code</label>
<select id="country"></select>

<label>Phone Number</label>
<input type="text" id="number" placeholder="3001234567">

<label>Message (Optional)</label>
<textarea id="message" rows="3">Assalam o Alaikum</textarea>

<button onclick="generate()">Generate Link</button>

<div class="output" id="result">No link generated yet</div>

<button id="copyBtn" onclick="copyLink()" disabled>Copy Link</button>
<div class="success" id="copyStatus"></div>

<div class="qr" id="qr"></div>

<div class="footer">© HAMEED ULLAH</div>

<!-- 🚀 Only Your WhatsApp Channel -->
<a class="big-btn" href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank">
Join My WhatsApp Channel 🚀
</a>

</div>

<script>
const countries=[
["🇦🇫 Afghanistan","93"],["🇦🇱 Albania","355"],["🇩🇿 Algeria","213"],
["🇦🇺 Australia","61"],["🇧🇩 Bangladesh","880"],["🇧🇷 Brazil","55"],
["🇨🇦 Canada","1"],["🇨🇳 China","86"],["🇫🇷 France","33"],
["🇩🇪 Germany","49"],["🇮🇳 India","91"],["🇮🇩 Indonesia","62"],
["🇮🇷 Iran","98"],["🇮🇶 Iraq","964"],["🇵🇰 Pakistan","92"],
["🇸🇦 Saudi Arabia","966"],["🇦🇪 UAE","971"],["🇬🇧 UK","44"],
["🇺🇸 USA","1"],["🇹🇷 Turkey","90"],["🇻🇳 Vietnam","84"]
];

const select=document.getElementById("country");
const result=document.getElementById("result");
const copyBtn=document.getElementById("copyBtn");
const status=document.getElementById("copyStatus");
const qr=document.getElementById("qr");

countries.forEach(c=>{
    let o=document.createElement("option");
    o.value=c[1];
    o.textContent=`${c[0]} (+${c[1]})`;
    if(c[1]==="92") o.selected=true;
    select.appendChild(o);
});

let generatedLink="";

function generate(){
    const c=select.value;
    const n=document.getElementById("number").value.trim();
    const m=document.getElementById("message").value.trim();

    if(!n){
        alert("Please enter phone number");
        return;
    }

    generatedLink=`https://wa.me/${c}${n}`;
    if(m) generatedLink+=`?text=${encodeURIComponent(m)}`;

    result.textContent=generatedLink;
    copyBtn.disabled=false;
    status.textContent="";

    qr.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(generatedLink)}">`;
}

function copyLink(){
    if(!generatedLink) return;

    navigator.clipboard.writeText(generatedLink).then(()=>{
        status.textContent="✔ Link copied successfully";
        setTimeout(()=>status.textContent="",2000);
    });
}
</script>

</body>
</html>
