<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>HAMEED ULLAH TikTok Title & Description Generator</title>  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');  :root {  
        --tiktok-red: #fe2c55;  
        --tiktok-blue: #25f4ee;  
        --tiktok-black: #010101;  
        --tiktok-grey: #f1f1f2;  
    }  

    * {  
        margin: 0;  
        padding: 0;  
        box-sizing: border-box;  
    }  

    body {  
        font-family: 'Poppins', sans-serif;  
        background-color: var(--tiktok-black);  
        margin: 0;  
        padding: 0;  
        color: #333;  
        min-height: 100vh;  
        overflow-x: hidden;  
        position: relative;  
    }  

    .background {  
        position: fixed;  
        top: 0;  
        left: 0;  
        width: 100%;  
        height: 100%;  
        z-index: -1;  
        overflow: hidden;  
    }  

    .background:before {  
        content: '';  
        position: absolute;  
        top: 0;  
        left: 0;  
        width: 100%;  
        height: 100%;  
        background: linear-gradient(45deg, var(--tiktok-black) 0%, #111 100%);  
        opacity: 0.9;  
    }  

    .bubble {  
        position: absolute;  
        border-radius: 50%;  
        background: linear-gradient(45deg, var(--tiktok-blue), var(--tiktok-red));  
        filter: blur(10px);  
        opacity: 0.3;  
        animation: float 10s infinite ease-in-out;  
    }  

    .bubble:nth-child(1) {  
        width: 180px;  
        height: 180px;  
        left: 10%;  
        top: 60%;  
        animation-delay: 0s;  
    }  

    .bubble:nth-child(2) {  
        width: 120px;  
        height: 120px;  
        right: 15%;  
        top: 30%;  
        animation-delay: 2s;  
        background: linear-gradient(45deg, var(--tiktok-red), var(--tiktok-blue));  
    }  

    .bubble:nth-child(3) {  
        width: 150px;  
        height: 150px;  
        left: 50%;  
        top: 70%;  
        animation-delay: 4s;  
    }  

    .bubble:nth-child(4) {  
        width: 100px;  
        height: 100px;  
        right: 30%;  
        bottom: 10%;  
        animation-delay: 6s;  
        background: linear-gradient(45deg, #25f4ee, #a854f9);  
    }  

    .bubble:nth-child(5) {  
        width: 80px;  
        height: 80px;  
        left: 30%;  
        top: 20%;  
        animation-delay: 8s;  
        background: linear-gradient(45deg, #f9c724, var(--tiktok-red));  
    }  

    @keyframes float {  
        0% {  
            transform: translateY(0) rotate(0deg);  
        }  
        50% {  
            transform: translateY(-40px) rotate(180deg);  
        }  
        100% {  
            transform: translateY(0) rotate(360deg);  
        }  
    }  

    .container {  
        max-width: 800px;  
        margin: 40px auto;  
        background-color: rgba(255, 255, 255, 0.9);  
        backdrop-filter: blur(10px);  
        padding: 30px;  
        border-radius: 20px;  
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);  
        position: relative;  
        overflow: hidden;  
        z-index: 10;  
    }  

    .container:after {  
        content: '';  
        position: absolute;  
        top: 0;  
        right: 0;  
        width: 100px;  
        height: 100px;  
        background: linear-gradient(135deg, var(--tiktok-blue), var(--tiktok-red));  
        border-radius: 0 0 0 100%;  
        opacity: 0.7;  
        z-index: -1;  
    }  

    .container:before {  
        content: '';  
        position: absolute;  
        bottom: 0;  
        left: 0;  
        width: 120px;  
        height: 120px;  
        background: linear-gradient(135deg, var(--tiktok-red), var(--tiktok-blue));  
        border-radius: 0 100% 0 0;  
        opacity: 0.7;  
        z-index: -1;  
    }  

    h1 {  
        text-align: center;  
        color: var(--tiktok-red);  
        margin-bottom: 30px;  
        font-weight: 700;  
        font-size: 2.5rem;  
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);  
        position: relative;  
        display: inline-block;  
        left: 50%;  
        transform: translateX(-50%);  
    }  

    h1:after {  
        content: '';  
        position: absolute;  
        bottom: -10px;  
        left: 0;  
        width: 100%;  
        height: 3px;  
        background: linear-gradient(90deg, var(--tiktok-blue), var(--tiktok-red));  
        border-radius: 10px;  
    }  

    .form-group {  
        margin-bottom: 25px;  
        position: relative;  
    }  

    label {  
        display: block;  
        margin-bottom: 10px;  
        font-weight: 600;  
        color: #333;  
        font-size: 1.1rem;  
    }  

    textarea, input, select {  
        width: 100%;  
        padding: 15px;  
        border: 2px solid #ddd;  
        border-radius: 12px;  
        font-size: 16px;  
        box-sizing: border-box;  
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);  
        transition: all 0.3s ease;  
        font-family: 'Poppins', sans-serif;  
    }  

    textarea:focus, input:focus, select:focus {  
        outline: none;  
        border-color: var(--tiktok-blue);  
        box-shadow: 0 0 0 3px rgba(37, 244, 238, 0.2);  
    }  

    select[multiple] {  
        height: 150px;  
    }  

    button {  
        position: relative;  
        overflow: hidden;  
        background-color: var(--tiktok-red);  
        color: white;  
        border: none;  
        padding: 16px 30px;  
        font-size: 18px;  
        border-radius: 10px;  
        cursor: pointer;  
        width: 100%;  
        margin-top: 15px;  
        font-weight: 600;  
        letter-spacing: 0.5px;  
        transition: all 0.3s ease;  
        z-index: 1;  
        box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);  
    }  

    button:before {  
        content: '';  
        position: absolute;  
        top: 0;  
        left: -100%;  
        width: 100%;  
        height: 100%;  
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);  
        transition: all 0.5s ease;  
        z-index: 2;  
    }  

    button:hover:before {  
        left: 100%;  
    }  

    button:hover {  
        transform: translateY(-3px);  
        box-shadow: 0 7px 20px rgba(254, 44, 85, 0.4);  
        background-color: #ff003c;  
    }  

    button:active {  
        transform: translateY(0);  
    }  

    .result {  
        margin-top: 40px;  
        background-color: var(--tiktok-grey);  
        padding: 25px;  
        border-radius: 15px;  
        display: none;  
        animation: fadeIn 0.5s ease-out;  
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);  
        position: relative;  
        overflow: hidden;  
    }  

    .result:before {  
        content: '';  
        position: absolute;  
        top: 0;  
        right: 0;  
        width: 50px;  
        height: 50px;  
        background: linear-gradient(135deg, var(--tiktok-blue), var(--tiktok-red));  
        border-radius: 0 0 0 50px;  
        opacity: 0.6;  
    }  

    .result h2 {  
        margin-top: 0;  
        color: var(--tiktok-red);  
        font-size: 1.5rem;  
        font-weight: 600;  
        display: flex;  
        align-items: center;  
    }  

    .result h2:before {  
        content: '';  
        width: 20px;  
        height: 20px;  
        background-color: var(--tiktok-blue);  
        border-radius: 50%;  
        margin-right: 10px;  
        display: inline-block;  
    }  

    .result p {  
        background-color: white;  
        padding: 15px;  
        border-radius: 8px;  
        margin: 15px 0;  
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);  
        font-size: 1.1rem;  
        line-height: 1.5;  
    }  

    .hashtag-container {  
        margin-top: 20px;  
    }  

    .hashtag-container h3 {  
        color: #333;  
        margin-bottom: 10px;  
        font-size: 1.2rem;  
    }  

    .generated-hashtags {  
        display: flex;  
        flex-wrap: wrap;  
        gap: 8px;  
        margin-top: 10px;  
    }  

    .hashtag {  
        background: linear-gradient(45deg, var(--tiktok-red), #ff6b87);  
        color: white;  
        padding: 5px 12px;  
        border-radius: 30px;  
        font-size: 14px;  
        display: inline-block;  
        animation: popIn 0.4s forwards;  
        opacity: 0;  
        transform: scale(0.8);  
    }  

    @keyframes popIn {  
        to {  
            opacity: 1;  
            transform: scale(1);  
        }  
    }  

    .loader {  
        display: none;  
        text-align: center;  
        margin: 30px 0;  
    }  

    .music-wave {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        height: 50px;  
    }  

    .music-wave span {  
        display: block;  
        width: 4px;  
        height: 35px;  
        background: linear-gradient(45deg, var(--tiktok-blue), var(--tiktok-red));  
        margin: 0 3px;  
        border-radius: 10px;  
        animation: wave 1.5s infinite ease-in-out;  
    }  

    .music-wave span:nth-child(2) {  
        animation-delay: 0.2s;  
    }  

    .music-wave span:nth-child(3) {  
        animation-delay: 0.4s;  
    }  

    .music-wave span:nth-child(4) {  
        animation-delay: 0.6s;  
    }  

    .music-wave span:nth-child(5) {  
        animation-delay: 0.8s;  
    }  

    @keyframes wave {  
        0%, 100% {  
            transform: scaleY(0.5);  
        }  
        50% {  
            transform: scaleY(1);  
        }  
    }  

    .copy-btn {  
        background: linear-gradient(45deg, #25d366, #128C7E);  
        padding: 10px 15px;  
        font-size: 14px;  
        margin-top: 10px;  
        border-radius: 8px;  
        transform: none;  
        transition: all 0.3s ease;  
        display: flex;  
        align-items: center;  
        justify-content: center;  
        width: auto;  
        display: inline-block;  
    }  

    .copy-btn:hover {  
        background: linear-gradient(45deg, #128C7E, #075E54);  
    }  

    .copy-btn:before {  
        display: none;  
    }  

    /* Auto-generate hashtags switch */  
    .switch-container {  
        display: flex;  
        align-items: center;  
        margin-top: 10px;  
        margin-bottom: 20px;  
    }  

    .switch {  
        position: relative;  
        display: inline-block;  
        width: 60px;  
        height: 30px;  
        margin-right: 10px;  
    }  

    .switch input {  
        opacity: 0;  
        width: 0;  
        height: 0;  
    }  

    .slider {  
        position: absolute;  
        cursor: pointer;  
        top: 0;  
        left: 0;  
        right: 0;  
        bottom: 0;  
        background-color: #ccc;  
        transition: .4s;  
        border-radius: 34px;  
    }  

    .slider:before {  
        position: absolute;  
        content: "";  
        height: 22px;  
        width: 22px;  
        left: 4px;  
        bottom: 4px;  
        background-color: white;  
        transition: .4s;  
        border-radius: 50%;  
    }  

    input:checked + .slider {  
        background: linear-gradient(45deg, var(--tiktok-blue), var(--tiktok-red));  
    }  

    input:checked + .slider:before {  
        transform: translateX(30px);  
    }  

    /* Responsive */  
    @media (max-width: 768px) {  
        .container {  
            margin: 20px;  
            padding: 20px;  
        }  
          
        h1 {  
            font-size: 2rem;  
        }  
          
        .bubble {  
            opacity: 0.2;  
        }  
    }  

    @keyframes fadeIn {  
        from { opacity: 0; transform: translateY(20px); }  
        to { opacity: 1; transform: translateY(0); }  
    }  
</style>
    

</head>
